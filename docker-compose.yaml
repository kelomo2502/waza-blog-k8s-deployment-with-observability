version: '3.8'

services:
  blog-app:
    build:
      context: ./blog-app
    container_name: blog-app
    ports:
      - "7000:8080"
    env_file:
      - ./blog-app/.env
    depends_on:
      - metrics-app

  metrics-app:
    build:
      context: ./metrics-app
    container_name: metrics-app
    ports:
      - "3000:3000"
    env_file:
      - ./metrics-app/.env
