apiVersion: apps/v1
kind: Deployment
metadata:
  name: waza-metrics
  labels:
    app: waza-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: waza-metrics
  template:
    metadata:
      labels:
        app: waza-metrics
    spec:
      containers:
        - name: waza-metrics
          image: kelomo2502/waza-metrics:v1
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: waza-metrics-env

          env:
            - name: NODE_ENV
              value: "production"
